name: Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'zk-cli/**'
      - '.github/workflows/integration-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'zk-cli/**'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast      # 快速测试（跳过 embedding）
          - full      # 全量测试
          - core      # 核心测试

env:
  # 设置 UTF-8 编码，避免 Windows 上的编码错误
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  # ============ 快速测试（PR 和 push 触发）============
  test-fast:
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.test_type == 'fast'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']
    
    defaults:
      run:
        working-directory: ./zk-cli
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'zk-cli/pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run fast tests (no embedding)
      run: |
        # 运行非 embedding 测试（单进程避免知识库冲突）
        pytest tests/ -m "not embedding and not slow" --timeout=180 -v --tb=short
      timeout-minutes: ${{ matrix.os == 'windows-latest' && 50 || 20 }}
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-fast-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          zk-cli/.pytest_cache/
          zk-cli/htmlcov/

  # ============ 核心测试（带 embedding，但只跑核心）============
  test-core:
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main' || github.event.inputs.test_type == 'core' || github.event.inputs.test_type == 'full'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.12']
    
    defaults:
      run:
        working-directory: ./zk-cli
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'zk-cli/pyproject.toml'

    - name: Cache model
      uses: actions/cache@v4
      with:
        path: ~/.cache/torch/sentence_transformers
        key: ${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run core tests
      run: |
        # 只跑核心工作流测试，单进程避免模型加载冲突
        pytest tests/test_core_workflow.py tests/test_integration.py -v --timeout=400 --tb=short
      timeout-minutes: ${{ matrix.os == 'windows-latest' && 50 || 25 }}
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-core-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          zk-cli/.pytest_cache/

  # ============ 全量测试（仅 main 分支或手动触发）============
  test-full:
    runs-on: ${{ matrix.os }}
    if: github.event.inputs.test_type == 'full'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    defaults:
      run:
        working-directory: ./zk-cli
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'zk-cli/pyproject.toml'

    - name: Cache model
      uses: actions/cache@v4
      with:
        path: ~/.cache/torch/sentence_transformers
        key: ${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run full test suite
      run: |
        # 全量测试，单进程（避免模型加载问题）
        pytest tests/ -v --timeout=600 --tb=short
      timeout-minutes: 60
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-full-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          zk-cli/.pytest_cache/

  # ============ 覆盖率报告汇总 ============
  coverage:
    runs-on: ubuntu-latest
    needs: [test-fast]
    if: always() && needs.test-fast.result == 'success'
    
    defaults:
      run:
        working-directory: ./zk-cli
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'zk-cli/pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run coverage
      run: |
        pytest tests/ -m "not embedding and not slow" --cov=zk --cov-report=xml --cov-report=html -v --timeout=300
      timeout-minutes: 25
    
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          zk-cli/htmlcov/
          zk-cli/coverage.xml
