name: Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'jfox/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/integration-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'jfox/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/integration-test.yml'
  # 允许手动触发
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast      # 快速测试（跳过 embedding）
          - full      # 全量测试
          - core      # 核心测试

env:
  # 设置 UTF-8 编码，避免 Windows 上的编码错误
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: 1

jobs:
  # ============ Lint 检查 ============
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run ruff check
      run: uv run ruff check jfox/ tests/

    - name: Run black check
      run: uv run black --check jfox/ tests/

  # ============ 快速测试（PR 和 push 触发）============
  test-fast:
    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.test_type == 'fast'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run fast tests (no embedding)
      run: |
        # 运行非 embedding 测试（单进程避免知识库冲突）
        uv run pytest tests/ -m "not embedding and not slow" --timeout=180 -v --tb=short
      timeout-minutes: ${{ matrix.os == 'windows-latest' && 50 || 20 }}
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-fast-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .pytest_cache/
          htmlcov/

  # ============ 核心测试（带 embedding，但只跑核心）============
  test-core:
    runs-on: ${{ matrix.os }}
    if: github.ref == 'refs/heads/main' || github.event.inputs.test_type == 'core' || github.event.inputs.test_type == 'full'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Cache model (Unix)
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: ~/.cache/torch/sentence_transformers
        key: ${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2

    - name: Cache model (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\torch\sentence_transformers
        key: ${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run core tests
      run: |
        # 只跑核心工作流测试，单进程避免模型加载冲突
        uv run pytest tests/test_core_workflow.py tests/test_integration.py -v --timeout=400 --tb=short
      timeout-minutes: ${{ matrix.os == 'windows-latest' && 50 || 25 }}
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-core-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .pytest_cache/

  # ============ 全量测试（仅 main 分支或手动触发）============
  test-full:
    runs-on: ${{ matrix.os }}
    if: github.event.inputs.test_type == 'full'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Cache model (Unix)
      if: runner.os != 'Windows'
      uses: actions/cache@v4
      with:
        path: ~/.cache/torch/sentence_transformers
        key: ${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2

    - name: Cache model (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\torch\sentence_transformers
        key: ${{ runner.os }}-sentence-transformers-all-MiniLM-L6-v2

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run full test suite
      run: |
        # 全量测试，单进程（避免模型加载问题）
        uv run pytest tests/ -v --timeout=600 --tb=short
      timeout-minutes: 60
      env:
        PYTHONIOENCODING: utf-8
        PYTHONUTF8: 1

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-full-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .pytest_cache/

  # ============ 质量门禁（所有必须测试通过才算成功）============
  quality-gate:
    runs-on: ubuntu-latest
    needs: [lint, test-fast]
    if: always()
    steps:
    - name: Check all jobs passed
      run: |
        echo "lint: ${{ needs.lint.result }}"
        echo "test-fast: ${{ needs.test-fast.result }}"
        if [[ "${{ needs.lint.result }}" == "success" && "${{ needs.test-fast.result }}" == "success" ]]; then
          echo "Quality gate passed!"
          exit 0
        else
          echo "Quality gate FAILED!"
          exit 1
        fi

  # ============ 覆盖率报告（仅 fast 测试通过后）============
  coverage:
    runs-on: ubuntu-latest
    needs: [test-fast]
    if: always() && needs.test-fast.result == 'success'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --extra dev

    - name: Run coverage
      run: |
        uv run pytest tests/ -m "not embedding and not slow" --cov=jfox --cov-report=xml --cov-report=html -v --timeout=300
      timeout-minutes: 25

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          htmlcov/
          coverage.xml
