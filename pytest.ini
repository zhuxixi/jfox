[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 超时配置（秒）- 防止测试挂死
timeout = 120

# 标记定义
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    performance: marks tests as performance tests
    integration: marks tests as integration tests
    workflow: marks tests as workflow tests
    bulk: marks tests that import large amount of data
    embedding: marks tests that require real embedding model

# 默认参数
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# 忽略目录
norecursedirs = 
    .git
    .venv
    venv
    __pycache__
    *.egg-info
    .pytest_cache
